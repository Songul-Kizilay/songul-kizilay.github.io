<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>flag{duck_detected}</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e0f;
      --panel: #12161a;
      --text: #d9e0e7;
      --green: #00ff88;
      --border: rgba(0, 255, 136, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(0, 255, 136, 0.08), transparent 32%),
        linear-gradient(180deg, #11152a 0%, var(--bg) 60%);
      font-family: "JetBrains Mono", monospace;
      color: var(--text);
    }

    .frame {
      width: min(92vw, 420px);
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(18, 22, 26, 0.92);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
    }

    .eyebrow {
      margin: 0 0 0.85rem;
      color: var(--green);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .caption {
      margin: 0.85rem 0 0;
      text-align: center;
      font-size: 0.9rem;
      color: #9fb0bc;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">songul@sec:~$ flag</p>
    <img src="assets/duck.flag.jpg" alt="Close-up duck meme" />
    <p class="caption">flag{caught_in_4k}</p>
  </main>
</body>
</html>
